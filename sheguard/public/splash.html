<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #7b2cbf 0%, #6a1b9a 40%, #4a0e7a 75%, #2d0050 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Diagonal texture overlay matching reference */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.015) 2px,
                rgba(255,255,255,0.015) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* Star/particle effect */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.15) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 90%, rgba(255,255,255,0.15) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .splash-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 1s ease-out forwards;
        }

        .logo-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 50px;
        }

        /* Outer glow pulse rings */
        .glow-ring-outer {
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: rgba(123, 44, 191, 0.15);
            animation: pulse 2.5s ease-in-out infinite;
        }

        .glow-ring-mid {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(180, 80, 255, 0.12);
            animation: pulse 2.5s ease-in-out infinite 0.4s;
        }

        .glow-ring-inner {
            position: absolute;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: rgba(255, 102, 178, 0.08);
            animation: pulse 2.5s ease-in-out infinite 0.8s;
        }

        .logo-img {
            width: clamp(200px, 45vw, 280px);
            height: clamp(200px, 45vw, 280px);
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 25px rgba(180, 80, 255, 0.7)) drop-shadow(0 0 50px rgba(123, 44, 191, 0.5));
            animation: floatLogo 3s ease-in-out infinite;
        }

        /* Progress bar */
        .progress-track {
            width: clamp(160px, 35vw, 220px);
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #9b4dca, #ff66b2);
            border-radius: 3px;
            animation: fillProgress 3s linear forwards;
            box-shadow: 0 0 8px rgba(255, 102, 178, 0.6);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.06); opacity: 0.6; }
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        @keyframes fillProgress {
            from { width: 0%; }
            to { width: 100%; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .fade-out {
            animation: fadeOut 0.6s ease-in forwards;
        }

        /* Mobile */
        @media (max-width: 480px) {
            .glow-ring-outer { width: 270px; height: 270px; }
            .glow-ring-mid { width: 220px; height: 220px; }
            .glow-ring-inner { width: 175px; height: 175px; }
        }
    </style>
</head>
<body>

    <div class="splash-container" id="splash">
        <div class="logo-wrapper">
            <div class="glow-ring-outer"></div>
            <div class="glow-ring-mid"></div>
            <div class="glow-ring-inner"></div>
            <img
                src="safeher.jpg"
                alt="SafeHer"
                class="logo-img"
                onerror="this.src='safeher.png'; this.onerror=null;"
            >
        </div>

        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('splash').classList.add('fade-out');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 600);
        }, 3000);
    </script>

</body>
</html>
