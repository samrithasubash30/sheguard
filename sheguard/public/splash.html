<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Exact dark cosmic purple from logo background */
            background: radial-gradient(ellipse at center, #3d1060 0%, #220840 50%, #0f0320 100%);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Stars matching logo */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(1.5px 1.5px at 12% 22%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 52% 68%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(2px 2px at 88% 52%, rgba(255,255,255,0.45) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 93% 28%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 42% 8%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 68% 88%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(2px 2px at 8% 58%, rgba(255,255,255,0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 97% 78%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 35% 45%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 60% 35%, rgba(255,255,255,0.3) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .splash-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.8s ease-out forwards;
        }

        .logo-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 50px;
        }

        /* Glow behind logo */
        .glow-ring-outer {
            position: absolute;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(120, 40, 200, 0.2) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        .glow-ring-mid {
            position: absolute;
            width: 290px;
            height: 290px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(150, 60, 220, 0.15) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite 0.5s;
        }

        .logo-img {
            width: clamp(240px, 52vw, 320px);
            height: clamp(240px, 52vw, 320px);
            object-fit: cover;
            position: relative;
            z-index: 2;
            /* No border radius - show full image so background blends */
            mix-blend-mode: lighten;
            animation: floatLogo 4s ease-in-out infinite;
        }

        /* Progress bar */
        .progress-track {
            width: clamp(160px, 35vw, 220px);
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #7b2cbf, #cc44aa);
            border-radius: 3px;
            animation: fillProgress 3s linear forwards;
            box-shadow: 0 0 10px rgba(200, 80, 200, 0.7);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.94); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.07); opacity: 0.6; }
        }
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fillProgress {
            from { width: 0%; }
            to { width: 100%; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .fade-out { animation: fadeOut 0.6s ease-in forwards; }

        @media (max-width: 480px) {
            .glow-ring-outer { width: 280px; height: 280px; }
            .glow-ring-mid { width: 210px; height: 210px; }
        }
    </style>
</head>
<body>
    <div class="splash-container" id="splash">
        <div class="logo-wrapper">
            <div class="glow-ring-outer"></div>
            <div class="glow-ring-mid"></div>
            <img src="safeher.jpg" alt="SafeHer" class="logo-img"
                onerror="this.onerror=null; this.src='safeher.png';">
        </div>
        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('splash').classList.add('fade-out');
            setTimeout(() => { window.location.href = 'index.html'; }, 600);
        }, 3000);
    </script>
</body>
</html>
