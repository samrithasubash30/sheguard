<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(ellipse at center, #6a1b9a 0%, #4a0e7a 40%, #1e0035 100%);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Diagonal texture like your reference */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: repeating-linear-gradient(
                -45deg,
                transparent, transparent 3px,
                rgba(255,255,255,0.012) 3px,
                rgba(255,255,255,0.012) 6px
            );
            pointer-events: none;
            z-index: 0;
        }

        .splash-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.9s ease-out forwards;
        }

        .logo-wrapper {
    position: relative;
    
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
}

        /* Glow rings */
        .glow-ring-outer {
            position: absolute;
            width: 750px;
            height: 750px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 80, 255, 0.15) 0%, transparent 70%);
            animation: pulse 2.5s ease-in-out infinite;
        }

        .glow-ring-mid {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 100, 255, 0.12) 0%, transparent 70%);
            animation: pulse 2.5s ease-in-out infinite 0.4s;
        }

        /* Logo - transparent PNG so no box at all */
        .logo-img {
            width: clamp(300px, 65vw, 480px);
height: clamp(300px, 65vw, 480px);
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: brightness(1.8) contrast(1.2)
            drop-shadow(0 0 25px rgba(255, 255, 255, 0.6))
            drop-shadow(0 0 50px rgba(220, 130, 255, 0.8))
            drop-shadow(0 0 80px rgba(180, 80, 255, 0.5));
            animation: floatLogo 3.5s ease-in-out infinite;
}

        /* Progress bar */
        .progress-track {
            width: clamp(160px, 38vw, 230px);
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #7b2cbf, #ff66b2);
            border-radius: 3px;
            animation: fillProgress 3s linear forwards;
            box-shadow: 0 0 10px rgba(255, 102, 178, 0.8);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.93); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.6; }
        }
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fillProgress {
            from { width: 0%; }
            to { width: 100%; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .fade-out { animation: fadeOut 0.6s ease-in forwards; }

        @media (max-width: 480px) {
            .glow-ring-outer { width: 240px; height: 240px; }
            .glow-ring-mid { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>
    <div class="splash-container" id="splash">
        <div class="logo-wrapper">
            <div class="glow-ring-outer"></div>
            <div class="glow-ring-mid"></div>
            <img src="safeher.png" alt="SafeHer" class="logo-img">
        </div>
        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('splash').classList.add('fade-out');
            setTimeout(() => { window.location.href = 'index.html'; }, 600);
        }, 3000);
    </script>
</body>
</html>
